spring:
  application:
    name: selfblog
  datasource:
    url: jdbc:postgresql://localhost:5432/selfblog?options=-c%20timezone=UTC
    username: root
    password: 123456
    driver-class-name: org.postgresql.Driver
  jackson:
    time-zone: UTC
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

jwt:
  secret: "9a4f2c5d8e1a3b7f6c8d9e0f1a2b3c4d5e6f7g8h9i0j1k2l3m4n5o6p7q8r9s0t"
  expiration:
    access: 86400000 # 24 hours (in milliseconds)
